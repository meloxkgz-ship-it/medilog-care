<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MediLog Premium App Icon</title>
  <desc id="desc">A refined graphite health icon with a luminous MediLog mark, medication capsule, and hydration accent.</desc>
  <defs>
    <radialGradient id="paperGlow" cx="23%" cy="12%" r="76%">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#F4F7F1"/>
      <stop offset="1" stop-color="#DDE9DC"/>
    </radialGradient>
    <linearGradient id="tile" x1="140" y1="96" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D2320"/>
      <stop offset="0.46" stop-color="#0E1311"/>
      <stop offset="1" stop-color="#030504"/>
    </linearGradient>
    <linearGradient id="tileEdge" x1="146" y1="94" x2="372" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="green" x1="182" y1="166" x2="330" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B6F3BB"/>
      <stop offset="0.52" stop-color="#72D487"/>
      <stop offset="1" stop-color="#3E995F"/>
    </linearGradient>
    <linearGradient id="capsule" x1="164" y1="294" x2="282" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F4F7F5"/>
      <stop offset="0.53" stop-color="#DDE9E3"/>
      <stop offset="1" stop-color="#BFD0C8"/>
    </linearGradient>
    <linearGradient id="drop" x1="328" y1="290" x2="386" y2="394" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4F7FB"/>
      <stop offset="0.5" stop-color="#7CCBD8"/>
      <stop offset="1" stop-color="#3C8E9C"/>
    </linearGradient>
    <filter id="tileShadow" x="90" y="82" width="340" height="370" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="25" flood-color="#162017" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.36"/>
    </filter>
    <filter id="softShadow" x="120" y="130" width="300" height="310" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#050706" flood-opacity="0.26"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="124" y="105" width="264" height="300" rx="78"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#paperGlow)"/>
  <circle cx="396" cy="102" r="56" fill="#FFFFFF" opacity="0.58"/>
  <path d="M94 340c86 47 206 53 326 9" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round" opacity="0.42"/>
  <path d="M106 382c76 32 178 38 304 5" stroke="#CFE0D0" stroke-width="22" stroke-linecap="round" opacity="0.42"/>

  <g filter="url(#tileShadow)">
    <rect x="124" y="105" width="264" height="300" rx="78" fill="url(#tile)"/>
    <rect x="125.5" y="106.5" width="261" height="297" rx="76.5" fill="none" stroke="url(#tileEdge)" stroke-width="3"/>
  </g>

  <g clip-path="url(#tileClip)">
    <circle cx="256" cy="256" r="98" fill="#FFFFFF" opacity="0.055"/>
    <path d="M146 152c55 28 133 37 241 18" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" opacity="0.055"/>
    <path d="M161 348c76 25 145 27 230 3" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" opacity="0.06"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M222 184c0-19 24-27 36-12l31 39 31-39c12-15 36-7 36 12v143c0 23-31 31-42 10l-25-47-25 47c-11 21-42 13-42-10V184Z" fill="url(#green)"/>
    <path d="M222 184c0-19 24-27 36-12l31 39 31-39c12-15 36-7 36 12" fill="none" stroke="#FFFFFF" stroke-opacity="0.36" stroke-width="8" stroke-linecap="round"/>

    <g transform="rotate(-28 232 260)">
      <rect x="161" y="238" width="142" height="48" rx="24" fill="url(#capsule)"/>
      <path d="M232 238v48" stroke="#BFD1C9" stroke-width="3" opacity="0.7"/>
      <path d="M180 250c22-9 49-10 77-4" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.65"/>
    </g>

    <path d="M360 280c22 31 42 58 42 86 0 31-22 53-54 53s-54-22-54-53c0-28 22-56 44-86 6-8 16-8 22 0Z" fill="url(#drop)"/>
    <path d="M333 350c0 18 11 31 28 32" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.64"/>
  </g>

  <path d="M164 442c55 21 137 27 222 4" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" opacity="0.36"/>
</svg>
